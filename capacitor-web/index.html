<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Perks Reminder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #ffffff;
        color: #111827;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }

      main {
        max-width: 320px;
      }

      h1 {
        font-size: 1.4rem;
        margin: 0 0 8px;
      }

      p {
        color: #4b5563;
        line-height: 1.5;
        margin: 0 0 18px;
      }

      a {
        background: #4f46e5;
        border-radius: 8px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 700;
        padding: 10px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Perks Reminder</h1>
      <p>The app could not reach the live service. Check your connection and try again.</p>
      <a href="https://www.perks-reminder.com">Retry</a>
    </main>
  </body>
</html>
